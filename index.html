<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>ナンバーズ3 攻略システム</title>
<style>
:root{
  --bg:#0e1117;--surface:#181d27;--surface2:#1f2636;--border:#2a3347;
  --accent:#4f8ef7;--accent2:#f7c04f;--accent3:#4ff7a0;
  --danger:#f74f4f;--warn:#f7944f;
  --text:#e4e8f0;--text2:#8a93a8;
  --font-head:'Georgia',serif;--font-body:'Helvetica Neue',Arial,sans-serif;--font-mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.7;}

/* ===== ログイン画面 ===== */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:340px;text-align:center;}
.login-title{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:var(--accent2);margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 16px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:12px;font-size:14px;cursor:pointer;font-family:var(--font-body);}
.login-btn:hover{opacity:0.85;}
.login-error{color:var(--danger);font-size:12px;margin-top:8px;display:none;}

/* ===== ナビ ===== */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-title{font-family:var(--font-mono);font-size:13px;color:var(--accent2);letter-spacing:2px;}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:var(--text2);text-decoration:none;font-size:13px;transition:color 0.2s;cursor:pointer;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);}

/* ===== コンテナ ===== */
.container{max-width:960px;margin:0 auto;padding:32px 20px;}
.page{display:none;}
.page.active{display:block;}

/* ===== 共通 ===== */
.section-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-family:var(--font-mono);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:bold;color:var(--accent2);margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--surface2);color:var(--text2);font-weight:normal;font-size:11px;letter-spacing:1px;padding:9px 12px;text-align:center;border:1px solid var(--border);}
td{padding:8px 12px;border:1px solid var(--border);text-align:center;color:var(--text);}
tr:nth-child(even) td{background:var(--surface2);}
.hl{color:var(--accent2);font-weight:bold;} .good{color:var(--accent3);} .bad{color:var(--danger);} .warn{color:var(--warn);} .dim{color:var(--text2);}
.note{font-size:12px;color:var(--text2);margin-top:8px;padding-left:12px;border-left:2px solid var(--border);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:620px){.two-col{grid-template-columns:1fr;}.four-col{grid-template-columns:1fr 1fr;}}
hr{border:none;border-top:1px solid var(--border);margin:24px 0;}

/* ===== ヒーロー ===== */
.hero{text-align:center;padding:40px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;}
.hero-label{font-size:11px;letter-spacing:3px;color:var(--accent2);font-family:var(--font-mono);margin-bottom:8px;}
.hero-round{font-size:13px;color:var(--text2);margin-bottom:16px;}
.digits{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.digit{width:72px;height:72px;border-radius:50%;background:var(--surface2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:32px;color:var(--accent);}
.hero-combos{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.combo-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 16px;font-family:var(--font-mono);font-size:16px;color:var(--accent2);}
.combo-tag .straight{font-size:10px;color:var(--text2);display:block;text-align:center;margin-top:2px;}

/* ===== AI思考 ===== */
.ai-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.ai-icon{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ai-name{font-size:13px;font-weight:bold;color:var(--accent);}
.ai-time{font-size:11px;color:var(--text2);}
.ai-text{color:var(--text);font-size:14px;line-height:1.8;white-space:pre-wrap;}

/* ===== アラート ===== */
.alert-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
.alert-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;}
.alert-item .digit-s{font-size:18px;font-weight:bold;margin-bottom:2px;}
.alert-item .alert-level{font-size:14px;}
.alert-item .alert-info{font-size:10px;color:var(--text2);}

/* ===== タブ ===== */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);}
.tab{padding:8px 20px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ===== チャートラッパー ===== */
.chart-wrap{position:relative;width:100%;margin-bottom:6px;}
.chart-label{font-size:12px;color:var(--text2);margin-bottom:8px;}

/* ===== ランクボックス ===== */
.rank-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.rank-num{font-size:11px;color:var(--text2);margin-bottom:4px;}
.rank-combo{font-size:22px;font-family:var(--font-mono);font-weight:bold;margin-bottom:4px;}
.rank-detail{font-size:11px;color:var(--text2);}

/* ===== ストレートボックス ===== */
.straight-box{background:var(--surface2);border:2px solid var(--accent3);border-radius:10px;padding:20px;text-align:center;margin-top:16px;}
.straight-label{font-size:11px;letter-spacing:3px;color:var(--accent3);font-family:var(--font-mono);margin-bottom:12px;}
.straight-row{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.sdig{width:56px;height:56px;background:var(--surface);border:2px solid var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;font-family:var(--font-head);color:var(--accent2);}
.spos{font-size:10px;color:var(--text2);margin-top:4px;text-align:center;}
.sarrow{font-size:20px;color:var(--text2);}

/* ===== アーカイブ ===== */
.archive-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.archive-item:hover{border-color:var(--accent);}
.archive-header{display:flex;align-items:center;justify-content:space-between;}
.archive-date{font-size:13px;color:var(--text2);}
.archive-candidates{display:flex;gap:8px;}
.archive-digit{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);}
.archive-result{font-size:12px;padding:2px 10px;border-radius:12px;font-weight:bold;}
.archive-result.hit{background:rgba(79,247,160,0.15);color:var(--accent3);border:1px solid var(--accent3);}
.archive-result.miss{background:rgba(247,79,79,0.15);color:var(--danger);border:1px solid var(--danger);}
.archive-result.pending{background:rgba(138,147,168,0.15);color:var(--text2);border:1px solid var(--border);}
.archive-detail{display:none;padding:16px 0 4px;border-top:1px solid var(--border);margin-top:12px;}

/* ===== ポイントバー ===== */
.pt-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.pt-label{width:200px;font-size:13px;color:var(--text);flex-shrink:0;}
.pt-track{flex:1;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden;}
.pt-fill{height:100%;border-radius:4px;background:var(--accent);}
.pt-num{width:40px;text-align:right;color:var(--accent2);font-family:var(--font-mono);font-size:13px;}

/* ===== フロー ===== */
.flow{display:flex;flex-direction:column;gap:6px;}
.flow-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fb{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:12px;color:var(--text);}
.fb.ac{border-color:var(--accent);color:var(--accent);}
.fb.ac2{border-color:var(--accent2);color:var(--accent2);}
.fb.rs{border-color:var(--accent3);color:var(--accent3);font-weight:bold;}
.fa{color:var(--text2);font-size:16px;}

/* ===== ローディング ===== */
.loading{text-align:center;padding:60px;color:var(--text2);}
.loading-dot{display:inline-block;animation:blink 1.4s infinite both;}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">NUMBERS3 SYSTEM</div>
    <div class="login-sub">パスワードを入力してください</div>
    <input type="password" id="login-password" class="login-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">パスワードが違います</div>
  </div>
</div>

<!-- ===== メインコンテンツ ===== -->
<div id="main-content" style="display:none;">

<nav>
  <div class="nav-title">NUMBERS3 SYSTEM</div>
  <div class="nav-links">
    <a class="active" onclick="showPage('top',this)">今日の予想</a>
    <a onclick="showPage('archive',this)">アーカイブ</a>
    <a onclick="showPage('about',this)">システム説明</a>
  </div>
</nav>

<div class="container">

  <!-- ===== TOP PAGE ===== -->
  <div id="page-top" class="page active">
    <div id="top-content">
      <div class="loading">データを読み込み中<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    </div>
  </div>

  <!-- ===== ARCHIVE PAGE ===== -->
  <div id="page-archive" class="page">
    <div style="margin-bottom:24px;"><div class="section-title">過去の予想アーカイブ</div></div>
    <div id="archive-content">
      <div class="loading">読み込み中<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    </div>
  </div>

  <!-- ===== ABOUT PAGE ===== -->
  <div id="page-about" class="page">
    <div style="margin-bottom:24px;"><div class="section-title">システム説明</div></div>
    <div id="about-content">
      <div class="loading">読み込み中<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    </div>
  </div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ===== ログイン =====
const PASSWORD = 'numbers3system';
function doLogin(){
  const pw = document.getElementById('login-password').value;
  if(pw === PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-content').style.display='block';
    sessionStorage.setItem('n3auth','1');
    loadMain();
  } else {
    document.getElementById('login-error').style.display='block';
  }
}
// セッション維持
if(sessionStorage.getItem('n3auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-content').style.display='block';
}

// ===== ページ切り替え =====
function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el) el.classList.add('active');
  if(name==='archive') loadArchive();
  if(name==='about') loadAbout();
}

// ===== タブ切り替え =====
function showTab(tabId,btn){
  const card = btn.closest('.tab-card');
  card.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  card.querySelector('#'+tabId).classList.add('active');
}

// ===== チャートヘルパー =====
const gc='rgba(255,255,255,0.06)';const tc='#898781';
function mkLine(id,datasets,ymin,ymax,ystep,labels){
  const ctx=document.getElementById(id);if(!ctx)return;
  new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:datasets.length>1,labels:{color:tc,font:{size:10},boxWidth:12}},
      tooltip:{callbacks:{label:i=>i.dataset.label+': '+(i.raw!==null?Math.round(i.raw*10)/10:'-')}}},
    scales:{x:{ticks:{color:tc,font:{size:9},maxRotation:30},grid:{color:gc}},
      y:{min:ymin,max:ymax,ticks:{color:tc,font:{size:9},stepSize:ystep},grid:{color:gc}}}
  }});
}
function mkBar(id,labels,datasets,max){
  const ctx=document.getElementById(id);if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:datasets.length>1,labels:{color:tc,font:{size:10},boxWidth:12}},
      tooltip:{callbacks:{label:i=>i.dataset.label?i.dataset.label+': '+i.raw+'回':i.raw+'回'}}},
    scales:{x:{ticks:{color:tc,font:{size:10}}},
      y:{max,ticks:{color:tc,font:{size:9}},grid:{color:gc}}}
  }});
}

// ===== メインデータ読み込み =====
async function loadMain(){
  try{
    const res=await fetch('data/latest.json?t='+Date.now());
    const data=await res.json();
    renderTop(data);
  }catch(e){
    document.getElementById('top-content').innerHTML='<div class="loading" style="color:var(--danger)">データの読み込みに失敗しました</div>';
  }
}

// ===== トップページ描画 =====
function renderTop(data){
  const a=data.analysis_a;
  const b=data.analysis_b;
  const alert=data.alert;
  const rankColors=['#f7c04f','#a0aab8','#c87941','#f74f4f'];
  const rankLabels=['1位','2位','3位','4位'];

  // 直近100回データ（グラフ用）
  const sums=data.chart_data?.sums||[];
  const maxs=data.chart_data?.maxs||[];
  const mins=data.chart_data?.mins||[];
  const ma5s=data.chart_data?.ma5s||[];
  const ma5max=data.chart_data?.ma5max||[];
  const ma5min=data.chart_data?.ma5min||[];
  const rounds=data.chart_data?.rounds||[];
  const sumDist=data.chart_data?.sum_dist||[];
  const maxDist=data.chart_data?.max_dist||[];
  const minDist=data.chart_data?.min_dist||[];
  const posData=data.chart_data?.pos_data||{};
  const ls=rounds.map((r,i)=>i%10===0?'第'+r+'回':'');

  let html=`
  <!-- ヒーロー -->
  <div class="hero">
    <div class="hero-label">NEXT TARGET — 第${data.next_round}回</div>
    <div class="hero-round">前回：第${data.latest_round}回 当選番号「${data.latest_number}」</div>
    <div class="digits">${a.candidates.map(d=>`<div class="digit">${d}</div>`).join('')}</div>
    <div class="hero-combos">
      ${b.straight_orders.map(s=>`
        <div class="combo-tag">${s.straight}<span class="straight">BOX: ${s.combo}</span></div>
      `).join('')}
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--text2);">セット購入 4口 = 800円</div>
  </div>

  <!-- AI思考 -->
  <div class="ai-box">
    <div class="ai-header">
      <div class="ai-icon">🤖</div>
      <div><div class="ai-name">Claude AI の分析思考</div><div class="ai-time">${data.date} 更新</div></div>
    </div>
    <div class="ai-text">${data.ai_thoughts}</div>
  </div>

  <!-- アラート -->
  <div class="card" style="margin-bottom:24px;">
    <div class="card-title">🔔 出現間隔アラート</div>
    <div class="alert-grid">
      ${Object.entries(alert).map(([d,v])=>`
        <div class="alert-item">
          <div class="digit-s">${d}</div>
          <div class="alert-level">${v.level}</div>
          <div class="alert-info">休止${v.current_rest}回<br>平均${v.avg_interval}回</div>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- 調査A / 調査B タブ -->
  <div class="card tab-card">
    <div class="tabs">
      <div class="tab active" onclick="showTab('tab-a',this)">候補数字調査 A</div>
      <div class="tab" onclick="showTab('tab-b',this)">候補数字調査 B</div>
    </div>

    <!-- ===== 調査A ===== -->
    <div id="tab-a" class="tab-content active">

      <div style="margin-bottom:12px;font-size:13px;color:var(--text2);">ポイント集計結果（最大20pt）</div>
      <table style="margin-bottom:20px;">
        <tr><th>数字</th><th>ひっぱり(5)</th><th>頻度(4)</th><th>勢い(4)</th><th>直近pull(3)</th><th>連番(4)</th><th>合計</th></tr>
        ${a.candidates.map(d=>`
          <tr>
            <td class="hl" style="font-size:18px;">${d}</td>
            <td>${a.details.pull_total[d]}</td>
            <td>${a.details.freq[d]}回</td>
            <td>${a.details.ikioi[d]>=0?'+':''}${a.details.ikioi[d]}</td>
            <td>${a.details.pull_score[d]}pt</td>
            <td>${a.details.renban[d]}pt</td>
            <td class="hl">${a.scores[d]}pt</td>
          </tr>
        `).join('')}
      </table>

      <!-- 勢いグラフ -->
      <div class="chart-label">▼ 勢い（11〜20回前 vs 1〜10回前）</div>
      <div class="chart-wrap" style="height:160px;"><canvas id="chart-ikioi"></canvas></div>

      <!-- ひっぱり系グラフ -->
      <div class="chart-label" style="margin-top:16px;">▼ ひっぱり系100回 数字別合計</div>
      <div class="chart-wrap" style="height:160px;"><canvas id="chart-pull"></canvas></div>

      <!-- 直近5回照合 -->
      <div style="margin-top:20px;font-size:13px;color:var(--text2);">直近5回との照合</div>
      <table style="margin-top:8px;">
        <tr><th>数字</th>${a.candidates.map(d=>`<th>${d}</th>`).join('')}</tr>
        <tr>
          <td class="dim">直近5回出現</td>
          ${a.candidates.map(d=>`<td class="${a.last5_hit[d]>=2?'good':a.last5_hit[d]>=1?'warn':'dim'}">${a.last5_hit[d]}回</td>`).join('')}
        </tr>
        <tr>
          <td class="dim">最新回(${data.latest_number})に含む</td>
          ${a.candidates.map(d=>`<td>${a.in_latest.includes(d)?'<span class="good">✓</span>':'<span class="dim">—</span>'}</td>`).join('')}
        </tr>
      </table>
    </div>

    <!-- ===== 調査B ===== -->
    <div id="tab-b" class="tab-content">

      <!-- B① 総和 -->
      <div style="font-size:13px;font-weight:bold;color:var(--accent2);margin-bottom:12px;">① 総和の傾向</div>

      <div class="chart-label">▼ 直近100回 総和の推移</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="chart-sum-line"></canvas></div>

      <div class="two-col" style="margin-top:12px;">
        <div>
          <div class="chart-label">▼ 総和分布（直近100回）</div>
          <div class="chart-wrap" style="height:160px;"><canvas id="chart-sum-dist"></canvas></div>
        </div>
        <div>
          <div class="chart-label">▼ 組み合わせ別 総和出現回数</div>
          <div class="chart-wrap" style="height:160px;"><canvas id="chart-combo-sum"></canvas></div>
        </div>
      </div>

      <div class="four-col" style="margin-top:12px;">
        ${b.combo_sum.map((c,i)=>`

// ===== アーカイブ =====
async function loadArchive(){
  const el=document.getElementById('archive-content');
  el.innerHTML='<div class="loading">読み込み中<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>';
  try{
    let archiveList=[];
    try{
      const r=await fetch('data/archive/index.json?t='+Date.now());
      archiveList=await r.json();
    }catch{
      const r=await fetch('data/latest.json?t='+Date.now());
      const latest=await r.json();
      archiveList=[{date:latest.date,round:latest.latest_round,candidates:latest.analysis_a.candidates,result_number:null,hit:null}];
    }
    if(archiveList.length===0){el.innerHTML='<div class="loading dim">アーカイブはまだありません</div>';return;}

    let html='';
    for(const item of archiveList){
      const hitLabel=item.hit===null
        ?'<span class="archive-result pending">結果待ち</span>'
        :item.hit
          ?'<span class="archive-result hit">✓ 当選あり</span>'
          :'<span class="archive-result miss">✗ 外れ</span>';
      const resultStr=item.result_number?` → 当選：${item.result_number}`:'';
      html+=`
        <div class="archive-item" onclick="toggleArchive(this,'${item.date}')">
          <div class="archive-header">
            <div>
              <div style="font-size:13px;font-weight:bold;">${item.date}${resultStr}</div>
              <div class="archive-date">第${item.round}回の翌回予想</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              ${hitLabel}
              <div class="archive-candidates">${item.candidates.map(d=>`<div class="archive-digit">${d}</div>`).join('')}</div>
            </div>
          </div>
          <div class="archive-detail">
            <div style="color:var(--text2);font-size:13px;">詳細を読み込み中...</div>
          </div>
        </div>`;
    }
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<div class="loading" style="color:var(--danger)">読み込みに失敗しました</div>';
  }
}

async function toggleArchive(el,date){
  const detail=el.querySelector('.archive-detail');
  const isOpen=detail.style.display==='block';
  detail.style.display=isOpen?'none':'block';
  if(!isOpen && !detail.dataset.loaded){
    detail.dataset.loaded='1';
    try{
      const r=await fetch(`data/archive/${date}.json?t=`+Date.now());
      const d=await r.json();
      detail.innerHTML=`
        <div class="ai-text" style="font-size:13px;">${d.ai_thoughts}</div>
        <div style="margin-top:12px;color:var(--text2);font-size:12px;">
          候補数字：${d.analysis_a.candidates.join('・')} ／
          購入：${d.analysis_b.straight_orders.map(s=>s.straight).join('・')}
        </div>`;
    }catch{
      detail.innerHTML='<div style="color:var(--danger);font-size:13px;">データの読み込みに失敗しました</div>';
    }
  }
}
