<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>ナンバーズ3 攻略システム</title>
<style>
:root{
  --bg:#0e1117;--surface:#181d27;--surface2:#1f2636;--border:#2a3347;
  --accent:#4f8ef7;--accent2:#f7c04f;--accent3:#4ff7a0;
  --danger:#f74f4f;--warn:#f7944f;
  --text:#e4e8f0;--text2:#8a93a8;
  --font-head:'Georgia',serif;--font-body:'Helvetica Neue',Arial,sans-serif;--font-mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.8;}

/* ログイン */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px 40px;width:360px;text-align:center;}
.login-title{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:var(--accent2);margin-bottom:10px;}
.login-h{font-family:var(--font-head);font-size:24px;font-weight:normal;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:13px 16px;color:var(--text);font-size:15px;margin-bottom:12px;outline:none;transition:border-color 0.2s;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:13px;font-size:15px;cursor:pointer;letter-spacing:1px;}
.login-btn:hover{opacity:0.85;}
.login-error{color:var(--danger);font-size:13px;margin-top:10px;display:none;}

/* ナビ */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.nav-title{font-family:var(--font-mono);font-size:13px;color:var(--accent2);letter-spacing:3px;}
.nav-links{display:flex;gap:24px;}
.nav-links a{color:var(--text2);text-decoration:none;font-size:14px;cursor:pointer;transition:color 0.2s;padding-bottom:2px;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);border-bottom:2px solid var(--accent);}

/* コンテナ */
.container{max-width:960px;margin:0 auto;padding:40px 24px;}
.page{display:none;}
.page.active{display:block;}

/* 共通：section, card, table */
.section{margin-bottom:56px;}
.section-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);font-family:var(--font-mono);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:bold;color:var(--accent);margin-bottom:12px;}
.card p{color:var(--text2);font-size:14px;line-height:1.8;}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px;}
th{background:var(--surface2);color:var(--text2);font-weight:normal;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:10px 14px;text-align:center;border:1px solid var(--border);}
td{padding:10px 14px;border:1px solid var(--border);text-align:center;color:var(--text);}
tr:nth-child(even) td{background:var(--surface2);}
.hl{color:var(--accent2);font-weight:bold;}
.good{color:var(--accent3);}
.bad{color:var(--danger);}
.warn{color:var(--warn);}
.dim{color:var(--text2);}
.note{font-size:13px;color:var(--text2);margin-top:12px;padding-left:14px;border-left:2px solid var(--border);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
hr{border:none;border-top:1px solid var(--border);margin:36px 0;}
@media(max-width:640px){.two-col{grid-template-columns:1fr;}.four-col{grid-template-columns:1fr 1fr;}}

/* ヘッダー（調査A/B スタイル） */
.doc-header{border-left:4px solid var(--accent);padding-left:22px;margin-bottom:52px;}
.doc-header.b{border-left-color:var(--accent2);}
.doc-header .label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-family:var(--font-mono);margin-bottom:8px;}
.doc-header.b .label{color:var(--accent2);}
.doc-header h1{font-family:var(--font-head);font-size:34px;font-weight:normal;color:var(--text);margin-bottom:8px;}
.doc-header .sub{color:var(--text2);font-size:14px;}

/* 予想ヒーロー */
.hero{background:var(--surface2);border:2px solid var(--accent3);border-radius:12px;padding:36px 24px;text-align:center;margin-bottom:32px;}
.hero-label{font-size:11px;letter-spacing:3px;color:var(--accent3);font-family:var(--font-mono);margin-bottom:10px;}
.hero-round{font-size:14px;color:var(--text2);margin-bottom:20px;}
.digits{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:24px;}
.digit{width:80px;height:80px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:36px;color:var(--accent);}
.hero-combos{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.combo-tag{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-family:var(--font-mono);font-size:18px;color:var(--accent2);}
.combo-tag .straight{font-size:11px;color:var(--text2);display:block;text-align:center;margin-top:4px;}

/* AI思考 */
.ai-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:32px;}
.ai-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.ai-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ai-name{font-size:15px;font-weight:bold;color:var(--accent);}
.ai-time{font-size:12px;color:var(--text2);margin-top:2px;}
.ai-text{color:var(--text);font-size:15px;line-height:1.9;white-space:pre-wrap;}

/* アラート */
.alert-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px;}
.alert-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center;}
.alert-digit{font-size:22px;font-weight:bold;margin-bottom:4px;}
.alert-level{font-size:18px;}
.alert-info{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}

/* ランクボックス */
.rank-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;}
.rank-num{font-size:12px;color:var(--text2);margin-bottom:6px;}
.rank-combo{font-size:28px;font-family:var(--font-mono);font-weight:bold;margin-bottom:8px;}
.rank-detail{font-size:12px;color:var(--text2);line-height:1.6;}

/* ストレートボックス */
.straight-box{background:var(--surface2);border:2px solid var(--accent3);border-radius:10px;padding:24px;text-align:center;margin-top:18px;}
.straight-label{font-size:11px;letter-spacing:3px;color:var(--accent3);font-family:var(--font-mono);margin-bottom:14px;}
.straight-row{display:flex;justify-content:center;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.sdig-wrap{text-align:center;}
.sdig{width:60px;height:60px;background:var(--surface);border:2px solid var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;font-family:var(--font-head);color:var(--accent2);}
.spos{font-size:11px;color:var(--text2);margin-top:6px;}
.sarrow{font-size:22px;color:var(--text2);margin-top:18px;}

/* チャート */
.chart-wrap{position:relative;width:100%;}
.chart-label{font-size:13px;color:var(--text2);margin-bottom:10px;margin-top:20px;}

/* フロー */
.flow{display:flex;flex-direction:column;gap:8px;}
.flow-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fb{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 16px;font-size:13px;color:var(--text);}
.fb.ac{border-color:var(--accent2);color:var(--accent2);}
.fb.rs{border-color:var(--accent3);color:var(--accent3);font-weight:bold;}
.fa{color:var(--text2);font-size:18px;}

/* ポイントバー */
.pt-bar{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.pt-label{width:220px;font-size:14px;color:var(--text);flex-shrink:0;}
.pt-track{flex:1;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden;}
.pt-fill{height:100%;border-radius:4px;background:var(--accent);}
.pt-num{width:44px;text-align:right;color:var(--accent2);font-family:var(--font-mono);font-size:14px;}

/* アーカイブ */
.archive-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;cursor:pointer;transition:border-color 0.2s;}
.archive-item:hover{border-color:var(--accent);}
.archive-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.archive-meta{font-size:13px;color:var(--text2);margin-top:4px;}
.archive-candidates{display:flex;gap:8px;}
.archive-digit{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--accent);}
.result-badge{font-size:12px;padding:3px 12px;border-radius:12px;font-weight:bold;}
.result-badge.hit{background:rgba(79,247,160,0.15);color:var(--accent3);border:1px solid var(--accent3);}
.result-badge.miss{background:rgba(247,79,79,0.15);color:var(--danger);border:1px solid var(--danger);}
.result-badge.pending{background:rgba(138,147,168,0.15);color:var(--text2);border:1px solid var(--border);}
.archive-detail{display:none;padding:18px 0 4px;border-top:1px solid var(--border);margin-top:14px;}

/* ローディング */
.loading{text-align:center;padding:70px;color:var(--text2);font-size:15px;}
.dot{display:inline-block;animation:blink 1.4s infinite both;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}
</style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">NUMBERS3 SYSTEM</div>
    <div class="login-h">攻略システム</div>
    <div class="login-sub">パスワードを入力してください</div>
    <input type="password" id="pw" class="login-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">LOGIN</button>
    <div class="login-error" id="login-error">パスワードが違います</div>
  </div>
</div>

<div id="main" style="display:none;">
<nav>
  <div class="nav-title">NUMBERS3 SYSTEM</div>
  <div class="nav-links">
    <a class="active" onclick="showPage('top',this)">今日の予想</a>
    <a onclick="showPage('archive',this)">アーカイブ</a>
    <a onclick="showPage('about',this)">システム説明</a>
  </div>
</nav>

<div class="container">

  <!-- TOP -->
  <div id="page-top" class="page active">
    <div id="top-content">
      <div class="loading">データを読み込み中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
  </div>

  <!-- ARCHIVE -->
  <div id="page-archive" class="page">
    <div class="section-title" style="margin-bottom:20px;">過去の予想アーカイブ</div>
    <div id="archive-content">
      <div class="loading">読み込み中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
  </div>

  <!-- ABOUT -->
  <div id="page-about" class="page">
    <div id="about-content">
      <div class="loading">読み込み中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
  </div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ===== 認証 =====
const PW='numbers3system';
function doLogin(){
  if(document.getElementById('pw').value===PW){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main').style.display='block';
    sessionStorage.setItem('n3','1');
    loadMain();
  }else{
    document.getElementById('login-error').style.display='block';
  }
}
if(sessionStorage.getItem('n3')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main').style.display='block';
}

// ===== ページ切替 =====
function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el)el.classList.add('active');
  if(name==='archive')loadArchive();
  if(name==='about')loadAbout();
}

// ===== チャートヘルパー =====
const GC='rgba(255,255,255,0.07)',TC='#9aa0ad';
function mkLine(id,datasets,ymin,ymax,ystep,labels){
  const c=document.getElementById(id);if(!c)return;
  new Chart(c,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:datasets.length>1,labels:{color:TC,font:{size:11},boxWidth:14,padding:14}},
      tooltip:{callbacks:{label:i=>i.dataset.label+': '+(i.raw!==null?Math.round(i.raw*10)/10:'-')}}
    },
    scales:{
      x:{ticks:{color:TC,font:{size:10},maxRotation:0,autoSkip:false},grid:{color:GC}},
      y:{min:ymin,max:ymax,ticks:{color:TC,font:{size:10},stepSize:ystep},grid:{color:GC}}
    }
  }});
}
function mkBar(id,labels,datasets,max){
  const c=document.getElementById(id);if(!c)return;
  new Chart(c,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:datasets.length>1,labels:{color:TC,font:{size:11},boxWidth:14}},
      tooltip:{callbacks:{label:i=>(i.dataset.label?i.dataset.label+': ':'')+i.raw+'回'}}
    },
    scales:{
      x:{ticks:{color:TC,font:{size:11}},grid:{display:false}},
      y:{max,ticks:{color:TC,font:{size:10}},grid:{color:GC}}
    }
  }});
}

// ===== TOP読み込み =====
async function loadMain(){
  try{
    const res=await fetch('data/latest.json?t='+Date.now());
    const data=await res.json();
    renderTop(data);
  }catch(e){
    document.getElementById('top-content').innerHTML='<div class="loading" style="color:var(--danger)">データの読み込みに失敗しました</div>';
  }
}

function renderTop(D){
  const a=D.analysis_a,b=D.analysis_b,al=D.alert;
  const cd=D.chart_data||{};
  const RC=['#f7c04f','#a0aab8','#c87941','#f74f4f'];
  const RL=['1位','2位','3位','4位'];

  document.getElementById('top-content').innerHTML=`
<!-- ===== 予想ヒーロー ===== -->
<div class="hero">
  <div class="hero-label">NEXT TARGET — 第${D.next_round}回</div>
  <div class="hero-round">前回：第${D.latest_round}回 当選番号「${D.latest_number}」</div>
  <div class="digits">${a.candidates.map(d=>`<div class="digit">${d}</div>`).join('')}</div>
  <div class="hero-combos">
    ${b.straight_orders.map(s=>`<div class="combo-tag">${s.straight}<span class="straight">BOX: ${s.combo}</span></div>`).join('')}
  </div>
  <div style="margin-top:14px;font-size:13px;color:var(--text2);">セット購入 4口 = 800円</div>
</div>

<!-- ===== AI思考 ===== -->
<div class="ai-box">
  <div class="ai-header">
    <div class="ai-icon">🤖</div>
    <div><div class="ai-name">Claude AI の分析思考</div><div class="ai-time">${D.date} 更新</div></div>
  </div>
  <div class="ai-text">${D.ai_thoughts}</div>
</div>

<!-- ===== 出現間隔アラート ===== -->
<div class="section">
  <div class="section-title">出現間隔アラート</div>
  <div class="alert-grid">
    ${Object.entries(al).map(([d,v])=>`
      <div class="alert-item">
        <div class="alert-digit">${d}</div>
        <div class="alert-level">${v.level}</div>
        <div class="alert-info">休止 ${v.current_rest}回<br>平均 ${v.avg_interval}回</div>
      </div>`).join('')}
  </div>
  <p class="note" style="margin-top:14px;">🔴平均の1.5倍以上休止中 / 🟡1.0〜1.5倍 / 🟢0.5〜1.0倍 / ⚪直近出現済み</p>
</div>

<!-- ===== 候補数字調査A ===== -->
<div class="doc-header">
  <div class="label">Survey A</div>
  <h1>候補数字調査 A</h1>
  <div class="sub">過去の当選番号データから次回の当選番号に含まれる可能性が高い数字を4つ選出する</div>
</div>

<div class="section">
  <div class="section-title">01 — ポイント集計結果（最大20pt）</div>
  <table>
    <tr><th>順位</th><th>数字</th><th>ひっぱり系(5)</th><th>頻度(4)</th><th>勢い(4)</th><th>直近pull(3)</th><th>連番(4)</th><th>合計</th></tr>
    ${a.candidates.map((d,i)=>`
      <tr>
        <td class="dim">${i+1}位</td>
        <td class="hl" style="font-size:20px;">${d}</td>
        <td>${a.details.pull_total[d]}</td>
        <td>${a.details.freq[d]}回</td>
        <td class="${a.details.ikioi[d]>0?'good':a.details.ikioi[d]<0?'bad':'dim'}">${a.details.ikioi[d]>=0?'+':''}${a.details.ikioi[d]}</td>
        <td>${a.details.pull_score[d]}pt</td>
        <td>${a.details.renban[d]}pt</td>
        <td class="hl" style="font-size:16px;">${a.scores[d]}pt</td>
      </tr>`).join('')}
  </table>
</div>

<div class="section">
  <div class="section-title">02 — 勢い（直近20回の変化）</div>
  <div class="chart-label">▼ 11〜20回前 vs 1〜10回前の出現数の差</div>
  <div class="chart-wrap" style="height:180px;"><canvas id="c-ikioi"></canvas></div>
</div>

<div class="section">
  <div class="section-title">03 — ひっぱり系100回合計</div>
  <div class="card">
    <div class="card-title">ひっぱりとは</div>
    <p>前回・2回前・3回前の当選番号の数字が次回にも登場する現象。直近100回での発生率はひっぱり73%・隔世62%・二世代68%。3種類の合計値が高いほど「いつも引っ張られやすい安定した数字」を意味する。</p>
  </div>
  <div class="chart-label">▼ ひっぱり系100回 数字別合計</div>
  <div class="chart-wrap" style="height:180px;"><canvas id="c-pull"></canvas></div>
</div>

<div class="section">
  <div class="section-title">04 — 直近5回との照合</div>
  <table>
    <tr><th>数字</th>${a.candidates.map(d=>`<th style="font-size:18px;">${d}</th>`).join('')}</tr>
    <tr>
      <td class="dim">直近5回出現</td>
      ${a.candidates.map(d=>`<td class="${a.last5_hit[d]>=2?'good':a.last5_hit[d]>=1?'warn':'dim'}">${a.last5_hit[d]}回</td>`).join('')}
    </tr>
    <tr>
      <td class="dim">最新回(${D.latest_number})に含む</td>
      ${a.candidates.map(d=>`<td>${a.in_latest.includes(d)?'<span class="good" style="font-size:16px;">✓</span>':'<span class="dim">—</span>'}</td>`).join('')}
    </tr>
  </table>
  <div style="margin-top:20px;background:var(--surface2);border:2px solid var(--accent);border-radius:10px;padding:24px;text-align:center;">
    <div style="font-size:11px;letter-spacing:3px;color:var(--accent3);font-family:var(--font-mono);margin-bottom:14px;">候補数字（第${D.next_round}回）</div>
    <div class="digits" style="margin-bottom:14px;">${a.candidates.map(d=>`<div class="digit">${d}</div>`).join('')}</div>
    <div style="font-size:13px;color:var(--text2);">組み合わせ：${b.straight_orders.map(s=>s.combo).join(' / ')} → セット×4口 = <span style="color:var(--accent2);">800円</span></div>
  </div>
</div>

<!-- ===== 候補数字調査B ===== -->
<div class="doc-header b" style="margin-top:56px;">
  <div class="label">Survey B</div>
  <h1>候補数字調査 B</h1>

// ===== アーカイブ =====
async function loadArchive(){
  const el=document.getElementById('archive-content');
  el.innerHTML='<div class="loading">読み込み中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';
  try{
    let list=[];
    try{const r=await fetch('data/archive/index.json?t='+Date.now());list=await r.json();}
    catch{const r=await fetch('data/latest.json?t='+Date.now());const d=await r.json();list=[{date:d.date,round:d.latest_round,candidates:d.analysis_a.candidates,result_number:null,hit:null}];}
    if(!list.length){el.innerHTML='<div class="loading dim">アーカイブはまだありません</div>';return;}
    el.innerHTML=list.map((item,i)=>{
      const badge=item.hit===null
        ?'<span class="result-badge pending">結果待ち</span>'
        :item.hit?'<span class="result-badge hit">✓ 当選あり</span>':'<span class="result-badge miss">✗ 外れ</span>';
      const resultStr=item.result_number?` → 当選番号：${item.result_number}`:'';
      return `<div class="archive-item" onclick="toggleArchive(this,'${item.date}')">
        <div class="archive-header">
          <div>
            <div style="font-size:15px;font-weight:bold;">${item.date}${resultStr}</div>
            <div class="archive-meta">第${item.round}回の翌回予想</div>
          </div>
          <div style="display:flex;align-items:center;gap:14px;">
            ${badge}
            <div class="archive-candidates">${item.candidates.map(d=>`<div class="archive-digit">${d}</div>`).join('')}</div>
          </div>
        </div>
        <div class="archive-detail"><div style="color:var(--text2);font-size:14px;">▼ クリックで詳細を表示</div></div>
      </div>`;
    }).join('');
  }catch{el.innerHTML='<div class="loading" style="color:var(--danger)">読み込みに失敗しました</div>';}
}

async function toggleArchive(el,date){
  const d=el.querySelector('.archive-detail');
  const open=d.style.display==='block';
  d.style.display=open?'none':'block';
  if(!open&&!d.dataset.loaded){
    d.dataset.loaded='1';
    try{
      const r=await fetch(`data/archive/${date}.json?t=`+Date.now());
      const j=await r.json();
      d.innerHTML=`<div class="ai-text" style="font-size:14px;margin-bottom:14px;">${j.ai_thoughts}</div>
        <div style="color:var(--text2);font-size:13px;">候補数字：${j.analysis_a.candidates.join('・')} ／ 購入：${j.analysis_b.straight_orders.map(s=>s.straight).join('・')}</div>`;
    }catch{d.innerHTML='<div style="color:var(--danger);font-size:14px;">データの読み込みに失敗しました</div>';}
  }
}

    <div class="flow-row"><div class="fb" style="border-color:var(--accent2);color:var(--accent2);">サブ分析（出現間隔アラート）</div><div class="fa">→</div><div class="fb">候補数字に影響しない補助情報</div></div>
    <div class="fa" style="margin-left:20px;">↓</div>
    <div class="flow-row"><div class="fb">直近5回と照合</div><div class="fa">→</div><div class="fb rs">最終確認・購入へ</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">03 — メイン分析：5つの評価要素</div>
  <table>
    <tr><th>要素</th><th>参照期間</th><th>最大pt</th><th>配点基準</th></tr>
    <tr><td class="hl">①ひっぱり系合計</td><td>直近100回</td><td class="hl">5pt</td><td style="text-align:left;padding-left:14px;">1位:5pt / 2位:4pt / 3位:3pt / 4位:2pt / 5位:1pt</td></tr>
    <tr><td class="hl">②出現頻度</td><td>直近63回</td><td class="hl">4pt</td><td style="text-align:left;padding-left:14px;">1位:4pt / 2位:3pt / 3位:2pt / 4〜5位:1pt</td></tr>
    <tr><td class="hl">③勢い</td><td>直近20回</td><td class="hl">4pt</td><td style="text-align:left;padding-left:14px;">+3以上:4pt / +2:3pt / +1:2pt / 0:1pt / マイナス:0pt</td></tr>
    <tr><td class="hl">④直近ひっぱりスコア</td><td>直近3回</td><td class="hl">3pt</td><td style="text-align:left;padding-left:14px;">1回前:3pt / 2回前:2pt / 3回前:1pt（重複加算）</td></tr>
    <tr><td class="hl">⑤連番出現パターン</td><td>直近100回＋次回候補</td><td class="hl">4pt</td><td style="text-align:left;padding-left:14px;">count上位3位に3・2・1pt ＋ 次回連番候補なら+1pt</td></tr>
  </table>
  <div style="margin-top:20px;">
    <div class="pt-bar"><div class="pt-label">①ひっぱり系合計（最重要）</div><div class="pt-track"><div class="pt-fill" style="width:100%"></div></div><div class="pt-num">5pt</div></div>
    <div class="pt-bar"><div class="pt-label">②出現頻度</div><div class="pt-track"><div class="pt-fill" style="width:80%"></div></div><div class="pt-num">4pt</div></div>
    <div class="pt-bar"><div class="pt-label">③勢い</div><div class="pt-track"><div class="pt-fill" style="width:80%"></div></div><div class="pt-num">4pt</div></div>
    <div class="pt-bar"><div class="pt-label">④直近ひっぱりスコア</div><div class="pt-track"><div class="pt-fill" style="width:60%"></div></div><div class="pt-num">3pt</div></div>
    <div class="pt-bar"><div class="pt-label">⑤連番出現パターン</div><div class="pt-track"><div class="pt-fill" style="width:80%"></div></div><div class="pt-num">4pt</div></div>
  </div>

<div class="section">
  <div class="section-title">04 — ひっぱり系分析の詳細（最重要要素）</div>
  <div class="two-col">
    <div class="card"><div class="card-title">ひっぱり（1回前）</div><p>前回の当選番号に含まれる数字が、今回の当選番号に再登場する現象。直近100回での発生率：<span style="color:var(--accent3);">73%</span></p></div>
    <div class="card"><div class="card-title">隔世ひっぱり（2回前）</div><p>2回前の当選番号の数字が、今回の当選番号に登場する現象。直近100回での発生率：<span style="color:var(--accent3);">62%</span></p></div>
    <div class="card"><div class="card-title">二世代ひっぱり（3回前）</div><p>3回前の当選番号の数字が、今回の当選番号に登場する現象。直近100回での発生率：<span style="color:var(--accent3);">68%</span></p></div>
    <div class="card"><div class="card-title">勢い（③）の定義</div><p>「11〜20回前」と「1〜10回前」の出現回数の差。プラスが大きいほど直近で上昇中＝勢いがある数字。</p><p style="margin-top:8px;font-family:var(--font-mono);font-size:13px;color:var(--accent2);">勢い = 1〜10回前 − 11〜20回前</p></div>
  </div>
</div>

<div class="section">
  <div class="section-title">05 — サブ分析：出現間隔アラート</div>
  <div class="card"><div class="card-title">位置づけ</div><p>候補数字の選出には直接影響しない補助情報。ひっぱり系と逆の発想（出た数字は休む）に基づき、「そろそろ出るかもしれない数字」を地震予測のように警戒情報として提示する。🔴の数字がメイン分析でも上位に浮上してきた場合、候補数字の入れ替えを検討するシグナルとして活用する。</p></div>
  <table style="margin-top:14px;">
    <tr><th>レベル</th><th>基準</th><th>意味</th></tr>
    <tr><td style="color:var(--danger);">🔴 要注意</td><td>休止回数 ≥ 平均間隔 × 1.5</td><td>かなり長期間出ていない・復活に注意</td></tr>
    <tr><td style="color:var(--warn);">🟡 やや注意</td><td>休止回数 ≥ 平均間隔 × 1.0</td><td>平均的に出待ち状態</td></tr>
    <tr><td style="color:var(--accent3);">🟢 正常</td><td>休止回数 ≥ 平均間隔 × 0.5</td><td>特に問題なし</td></tr>
    <tr><td class="dim">⚪ 直近出現</td><td>直近で出現済み</td><td>まだ出る可能性は低め</td></tr>
  </table>
</div>

<div class="section">
  <div class="section-title">06 — ポイント制の運用方針</div>
  <div class="card"><div class="card-title">配点の修正ルール</div><p>各要素の配点は固定ではなく、毎週金曜日に週次検証を行い「この要素が特によく機能している」と判断した場合、その要素のポイント上限を随時引き上げる。逆に精度が低い要素は配点を下げる。データが蓄積されるほど精度が上がる設計。</p></div>
</div>

<div class="doc-header b" style="margin-top:48px;">
  <div class="label">Survey B</div>
  <h1>候補数字調査 B</h1>
  <div class="sub">調査Aで選出した候補数字が統計的傾向に適合しているかを検証する評価フレームワーク</div>
</div>

<div class="section">
  <div class="section-title">01 — 調査Aと調査Bの関係</div>
  <div class="card"><div class="card-title">位置づけ</div><p>調査BはAで選んだ候補数字を独立した視点で評価するもの。Aの数字より適切な数字があると判断した場合は候補の入れ替えも提案する。各組み合わせの<strong style="color:var(--accent2);">信頼度の順位づけとストレート購入順番の決定</strong>にも使う。</p></div>
  <div class="flow" style="margin-top:16px;">
    <div class="flow-row"><div class="fb ac">調査A：候補数字を選出</div><div class="fa">→</div><div class="fb">4C3 = 4通りの組み合わせ</div></div>
    <div class="fa" style="margin-left:20px;">↓</div>
    <div class="flow-row">
      <div class="fb ac">B①：総和の傾向と照合</div><div class="fa">+</div>
      <div class="fb ac">B②：最大・最小値の傾向と照合</div><div class="fa">+</div>
      <div class="fb ac">B③：桁別出現傾向と照合</div>
    </div>
    <div class="fa" style="margin-left:20px;">↓</div>
    <div class="flow-row"><div class="fb rs">組み合わせの順位づけ ＋ ストレート購入順番の決定</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">02 — 調査B① 総和の傾向</div>
  <div class="card"><div class="card-title">総和とは</div><p>当選番号3桁の合計値（例：481 → 4+8+1=13）。直近100回で「中ゾーン（10〜17）」に60%が集中しており、候補数字の組み合わせ総和がこのゾーンに入っているかを確認する。また折れ線グラフで波形を分析し、現在の総和トレンドと候補数字の総和が整合しているかを検証する。</p></div>
  <table style="margin-top:14px;">
    <tr><th>ゾーン</th><th>範囲</th><th>出現割合</th><th>評価</th></tr>
    <tr><td class="dim">低</td><td class="dim">0〜9</td><td class="dim">22%</td><td class="dim">やや少ない</td></tr>
    <tr><td class="hl">中</td><td class="hl">10〜17</td><td class="hl">60%</td><td class="good">最も多い（最有力ゾーン）</td></tr>
    <tr><td class="dim">高</td><td class="dim">18〜27</td><td class="dim">18%</td><td class="dim">少ない</td></tr>
  </table>
</div>

<div class="section">
  <div class="section-title">03 — 調査B② 最大値・最小値の傾向</div>
  <div class="card"><div class="card-title">最大値・最小値とは</div><p>当選番号3桁のうち最も大きい数字（最大値）と最も小さい数字（最小値）。直近100回の分析から、最大値は「9」が最頻（31回）、最小値は「1」が最頻（32回）という傾向がある。候補数字の組み合わせがこの傾向に合致しているかを確認する。最小値が5以上になる組み合わせは傾向に反するため評価が下がる。</p></div>
</div>

<div class="section">
  <div class="section-title">04 — 調査B③ 桁別出現傾向</div>
  <div class="card"><div class="card-title">桁別分析とは</div><p>各候補数字（0〜9）が百の位・十の位・一の位のどの桁に出やすいかを直近100回で分析する。最も出やすい桁に各数字を配置することで、ストレート当選の可能性を高めることが目的。均等型の数字（例：「1」は全桁12回ずつ）は残りの桁に配置する。</p></div>
  <table style="margin-top:14px;">
    <tr><th>数字例</th><th>最強桁</th><th>根拠例</th></tr>
    <tr><td class="hl">6</td><td class="good">百の位</td><td style="text-align:left;padding-left:14px;">百の位への出現が最多（例：15回）</td></tr>
    <tr><td class="hl">9</td><td class="good">十の位</td><td style="text-align:left;padding-left:14px;">十の位への出現が最多（例：13回）</td></tr>
    <tr><td class="hl">7</td><td class="good">一の位</td><td style="text-align:left;padding-left:14px;">一の位への出現が最多（例：13回）</td></tr>
    <tr><td class="hl">1</td><td class="dim">均等</td><td style="text-align:left;padding-left:14px;">全桁均等のため残り桁に配置</td></tr>
  </table>
</div>

<div class="section">
  <div class="section-title">05 — 週次検証ルーティン</div>
  <div class="card"><div class="card-title">毎回（月〜金）の流れ</div><p>① 当選番号発表（18:45）→ ② 前回の候補数字と照合（当たり・外れの確認）→ ③ 新しい当選番号をデータに追加 → ④ 次回用の候補数字を自動算出・表示</p></div>
  <div class="card"><div class="card-title">毎週金曜日の追加検証</div><p>① 月〜金の全結果をまとめて振り返り → ② 予想 vs 結果の週次集計 → ③ 外れた回があれば「何の要素があれば拾えたか」を分析 → ④ ポイント配点の修正要否を判断（理由付き）→ ⑤ 必要であれば翌週からシステムをバージョンアップ</p></div>
